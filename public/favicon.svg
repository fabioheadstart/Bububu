<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="48" height="48">
  <!-- Body -->
  <ellipse cx="60" cy="78" rx="46" ry="52"
    fill="#c4b5fd"
    filter="url(#glow)" />
  <!-- Glow filter -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Body highlight -->
  <ellipse cx="44" cy="56" rx="14" ry="20" fill="rgba(255,255,255,0.18)" />
  <!-- Eyes -->
  <circle cx="44" cy="68" r="9" fill="#1a1a2e" />
  <circle cx="76" cy="68" r="9" fill="#1a1a2e" />
  <!-- Eye shine -->
  <circle cx="41" cy="65" r="3" fill="white" />
  <circle cx="73" cy="65" r="3" fill="white" />
  <!-- Smile -->
  <path d="M 48 88 Q 60 98 72 88"
    stroke="#1a1a2e" stroke-width="3" fill="none" stroke-linecap="round" />
  <!-- Little legs -->
  <ellipse cx="44" cy="126" rx="12" ry="8" fill="#a78bfa" />
  <ellipse cx="76" cy="126" rx="12" ry="8" fill="#a78bfa" />
</svg>
